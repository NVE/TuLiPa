repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-added-large-files

-   repo: local  # Since you are using a 'system' language hook
    hooks:
    -   id: julia-formatter
        name: Julia Formatter
        # Use julia directly to ensure it handles the filenames passed by pre-commit
        entry: julia -e 'using JuliaFormatter; format(ARGS)'
        language: system
        files: \.jl$
        pass_filenames: true
